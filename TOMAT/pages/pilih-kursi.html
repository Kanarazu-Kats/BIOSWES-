<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pilih Kursi | BIOSWES</title>

<link rel="stylesheet" href="../css/style.css">

<style>

.container{
max-width:900px;
margin:40px auto;
padding:20px;
text-align:center;
}

.layar{
background:#fff;
color:#000;
padding:12px;
border-radius:8px;
margin-bottom:35px;
font-weight:bold;
}

.kursi{
display:grid;
grid-template-columns:repeat(8,55px);
justify-content:center;
gap:12px;
margin-bottom:30px;
}

.seat{
width:55px;
height:55px;
background:#444;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.seat:hover{
transform:scale(1.08);
}

.terpilih{
background:#FFD700;
color:#000;
}

.terisi{
background:#c0392b;
cursor:not-allowed;
}

.info{
margin-top:25px;
font-size:20px;
}

button{
margin-top:25px;
padding:15px 35px;
background:#FFD700;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:white;
}

.legend{
display:flex;
justify-content:center;
gap:25px;
margin-bottom:30px;
}

.legend div{
display:flex;
align-items:center;
gap:8px;
}

.box{
width:20px;
height:20px;
border-radius:4px;
}

</style>

</head>

<body>

<header>

<div class="logo">🎬 BIOSWES</div>

<nav>
<a href="../index.html">Home</a>
</nav>

</header>

<div class="container">

<h2>Pilih Kursi</h2>

<div class="layar">
LAYAR BIOSKOP
</div>

<div class="legend">

<div>
<div class="box" style="background:#444"></div>
Tersedia
</div>

<div>
<div class="box" style="background:#FFD700"></div>
Dipilih
</div>

<div>
<div class="box" style="background:#c0392b"></div>
Terisi
</div>

</div>

<div class="kursi" id="kursi"></div>

<div class="info">

Kursi :
<span id="hasil">-</span>

<br><br>

Total :

Rp <span id="total">0</span>

</div>

<button onclick="bayar()">

Lanjut Pembayaran →

</button>

</div>

<script>

const container=document.getElementById("kursi");

const hasil=document.getElementById("hasil");

const total=document.getElementById("total");

let pilih=[];

const harga=50000;

for(let i=1;i<=40;i++){

const seat=document.createElement("div");

seat.className="seat";

seat.innerHTML=i;

if([5,8,12,17,21,30].includes(i)){

seat.classList.add("terisi");

}else{

seat.onclick=function(){

seat.classList.toggle("terpilih");

const nomor=seat.innerHTML;

if(pilih.includes(nomor)){

pilih=pilih.filter(x=>x!=nomor);

}else{

pilih.push(nomor);

}

hasil.innerHTML=pilih.join(", ");

total.innerHTML=(pilih.length*harga).toLocaleString("id-ID");

};

}

container.appendChild(seat);

}

function bayar(){

if(pilih.length==0){

alert("Pilih kursi terlebih dahulu!");

return;

}

localStorage.setItem("kursi",JSON.stringify(pilih));

localStorage.setItem("total",pilih.length*harga);

window.location="pembayaran.html";

}

</script>

</body>
</html>
